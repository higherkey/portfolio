<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Brutalist 3: Highlighter Green</title>
    <style>
        body { background: #fff; color: #000; font-family: monospace; padding: 40px; }
        .highlight { background: #00FF00; display: inline; box-shadow: 5px 0 0 #00FF00, -5px 0 0 #00FF00; }
        h1 { font-size: 48px; text-transform: lowercase; }
        .hr-green { border: 0; height: 10px; background: #00FF00; margin: 40px 0; }
        .project-card { border: 2px solid #000; display: flex; align-items: stretch; }
        .project-title { width: 30%; background: #000; color: #00FF00; padding: 20px; font-size: 32px; font-weight: bold; text-transform: uppercase; }
        .project-info { width: 70%; padding: 20px; font-size: 18px; line-height: 1.5; }
        .btn { display: inline-block; margin-top: 20px; border: 2px solid #000; padding: 10px 20px; text-decoration: none; color: #000; font-weight: bold; font-size: 20px; transition: 0.2s; }
        .btn:hover { background: #00FF00; box-shadow: 4px 4px 0 #000; transform: translate(-2px, -2px); }
    </style>
</head>
<body>
    <h1><span class="highlight">your.name</span></h1>
    <p style="font-size: 24px;">senior software engineer</p>
    
    <hr class="hr-green">
    
    <div class="project-card">
        <div class="project-title">
            Board<br>Game<br>Hub
        </div>
        <div class="project-info">
            <p>Demonstrating robust backend systems and autonomous <span class="highlight">CI/CD pipelines</span>.</p>
            <p>- WebSockets via SignalR for real-time multiplayer states.<br>
               - Multi-stage Docker builds deployed to Azure.<br>
               - Code audited via strict SonarQube quality gates.</p>
            <a href="#" class="btn">VIEW SOURCE -></a>
        </div>
    </div>
</body>
</html>
