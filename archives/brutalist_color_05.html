<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Brutalist 5: Pale Pink Editorial</title>
    <style>
        body { background: #FFC0CB; color: #8B0000; font-family: "Courier New", Courier, monospace; margin: 0; padding: 5vh 5vw; display: flex; justify-content: center; align-items: center; min-height: 90vh;}
        .card { border: 2px solid #8B0000; padding: 40px; max-width: 600px; text-align: center; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); }
        h1 { font-family: "Georgia", serif; font-size: 3rem; font-style: italic; font-weight: normal; margin-top: 0; border-bottom: 1px solid #8B0000; padding-bottom: 20px;}
        .mono-tag { background: #8B0000; color: #FFC0CB; padding: 2px 8px; font-size: 0.9rem; text-transform: uppercase; }
        .project-name { font-size: 2rem; font-weight: bold; margin: 30px 0 10px 0; }
        p { font-size: 1.1rem; line-height: 1.6; font-weight: bold; }
        .button { display: inline-block; margin-top: 30px; padding: 15px 30px; border: 2px solid #8B0000; color: #8B0000; text-decoration: none; text-transform: uppercase; font-weight: bold; transition: all 0.3s;}
        .button:hover { background: #8B0000; color: #FFC0CB; border-radius: 50% 50% 0 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Your Name</h1>
        <p>A portfolio focusing on backend architecture, deployment precision, and zero-bloat frontend design.</p>
        
        <div style="margin-top:40px;">
            <span class="mono-tag">Featured Architected Project</span>
            <div class="project-name">BOARD GAME HUB</div>
            <p style="font-weight: normal;">Architectural marvel using SignalR, Docker multi-stage builds, Azure automation, and strict SonarQube gating.</p>
        </div>

        <a href="#" class="button">Evaluate Code</a>
    </div>
</body>
</html>
